name: .NET Core CI

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "SuperStrongPassword123!"
        ports:
          - 1433:1433

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Check for vulnerable packages
      run: dotnet list package --vulnerable

    - name: Build
      run: dotnet build --no-restore

    - name: Cache Playwright Browsers
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('**/OnboardingXUnitTests.csproj') }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Install Playwright Browsers and Dependencies
      run: pwsh ./OnboardingXUnitTests/bin/Debug/net8.0/playwright.ps1 install --with-deps

    - name: Setup HTTPS Certificate
      run: |
        mkdir -p ${{ github.workspace }}/.cert
        dotnet dev-certs https -ep ${{ github.workspace }}/.cert/cert.pfx -p mypassword
        dotnet dev-certs https --trust || true

    - name: Apply Database Migrations
      env:
        ConnectionStrings__DefaultConnection: "Server=127.0.0.1,1433;Database=OnboardingTestDb;User Id=sa;Password=SuperStrongPassword123!;TrustServerCertificate=True;"
      run: |
        dotnet tool install --global dotnet-ef
        dotnet ef database update --project ./Onboarding/Onboarding.csproj

    - name: Start the web application in the background
      env:
        ASPNETCORE_ENVIRONMENT: Development
        ASPNETCORE_Kestrel__Certificates__Default__Password: mypassword
        ASPNETCORE_Kestrel__Certificates__Default__Path: ${{ github.workspace }}/.cert/cert.pfx
        ConnectionStrings__DefaultConnection: "Server=127.0.0.1,1433;Database=OnboardingTestDb;User Id=sa;Password=SuperStrongPassword123!;TrustServerCertificate=True;"
      run: |
        dotnet run --project ./Onboarding/Onboarding.csproj --urls "https://localhost:7231" > app.log 2>&1 &
        echo "Waiting 15 seconds for server..."
        sleep 15
        echo "--- APP LOGS (app.log) ---"
        cat app.log
        echo "-----------------------------------------------"

    - name: Test with Coverage
      run: dotnet test --no-build --verbosity normal --collect:"XPlat Code Coverage"

    - name: Combine & Report Coverage
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: "**/TestResults/**/coverage.cobertura.xml"
        badge: true
        fail_below_min: false
        format: markdown
        output: both

    - name: Write to Job Summary
      run: cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY

    - name: Publish Build Artifacts
      run: dotnet publish -c Release -o ./publish

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: onboarding-app-release
        path: ./publish